<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Embed in Documents | StegoShield</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Consistent Gradient Background */
        .bg-advanced { background: radial-gradient(circle at 10% 20%, rgb(17, 24, 39) 0%, rgb(30, 41, 59) 100%); }
        .btn-back {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    color: #94a3b8;
    font-size: 0.875rem;
    font-weight: 600;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.btn-back:hover {
    background: rgba(59, 130, 246, 0.1);
    border-color: rgba(59, 130, 246, 0.4);
    color: #60a5fa;
    transform: translateX(-4px);
    box-shadow: -10px 0 20px -10px rgba(59, 130, 246, 0.3);
}

.btn-back svg {
    transition: transform 0.3s ease;
}

.btn-back:hover svg {
    transform: translateX(-3px);
}
        /* Matching Glassmorphism */
        .glass-panel { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
    </style>
</head>
<body class="bg-advanced min-h-screen text-white p-6">
    <div class="max-w-6xl mx-auto">
        <button onclick="window.location.href='index.html'" class="btn-back mb-8 group">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
    <span>Back to Workspace</span>
</button>

        <h1 class="text-4xl font-bold text-center mb-8 text-blue-400">Embed Secret in Document</h1>

        <div class="flex flex-col md:flex-row gap-6 mb-8">
            <div class="flex-1 glass-panel p-6 rounded-3xl flex flex-col border-2 border-dashed border-blue-500/30">
                <h2 class="text-xl font-bold mb-4 text-blue-400">1. Select Carrier File</h2>
                <div class="w-full h-64 bg-gray-900/50 rounded-2xl flex flex-col items-center justify-center mb-4 border border-white/5 overflow-hidden">
                    <p id="carrierPlaceholder" class="text-gray-500 px-4 text-center">Select any file type (.docx, .exe, .zip, etc.)</p>
                    <p id="carrierName" class="text-blue-400 text-sm mt-2 font-mono px-4 text-center"></p>
                </div>
                <input type="file" id="carrierInput" class="hidden" onchange="updateFileInfo('carrier')">
                <button onclick="document.getElementById('carrierInput').click()" class="mt-auto w-full py-3 bg-blue-600/20 border border-blue-500/50 rounded-xl font-bold hover:bg-blue-600 transition">Select Carrier</button>
            </div>

            <div class="flex-1 glass-panel p-6 rounded-3xl flex flex-col border-2 border-dashed border-teal-500/30">
                <h2 class="text-xl font-bold mb-4 text-teal-400">2. Select Secret File</h2>
                <div class="w-full h-64 bg-gray-900/50 rounded-2xl flex flex-col items-center justify-center mb-4 border border-white/5 overflow-hidden">
                    <p id="secretPlaceholder" class="text-gray-500 px-4 text-center">Select the file you want to hide</p>
                    <p id="secretName" class="text-teal-400 text-sm mt-2 font-mono px-4 text-center"></p>
                </div>
                <input type="file" id="secretInput" class="hidden" onchange="updateFileInfo('secret')">
                <button onclick="document.getElementById('secretInput').click()" class="mt-auto w-full py-3 bg-teal-600/20 border border-teal-500/50 rounded-xl font-bold hover:bg-teal-700 transition">Select Secret</button>
            </div>
        </div>

        <div class="max-w-2xl mx-auto glass-panel p-8 rounded-3xl">
            <div class="mb-6">
                <label class="block text-blue-300 text-sm font-bold mb-2">3. Set Security Password</label>
                <input type="password" id="password" 
                       class="w-full bg-gray-800 border border-white/10 p-4 rounded-xl text-white focus:outline-none focus:border-blue-500 shadow-inner" 
                       placeholder="Enter password to lock data">
            </div>
            
            <button onclick="processUniversal()" class="w-full py-4 bg-gradient-to-r from-blue-600 to-teal-500 rounded-xl font-extrabold text-lg shadow-lg hover:scale-[1.02] active:scale-95 transition-all">
                CLOAK DATA & DOWNLOAD
            </button>
            <p id="status" class="mt-4 text-center text-sm font-medium"></p>
        </div>
    </div>

    <script>
        const MARKER = "STEGO_SHIELD_V1";

        // Helper to update text labels when files are picked
        function updateFileInfo(type) {
            const input = document.getElementById(`${type}Input`);
            const nameDisplay = document.getElementById(`${type}Name`);
            const placeholder = document.getElementById(`${type}Placeholder`);
            
            if (input.files[0]) {
                placeholder.classList.add('hidden');
                nameDisplay.innerText = `📄 ${input.files[0].name}`;
            }
        }

        async function processUniversal() {
    const carrierFile = document.getElementById('carrierInput').files[0];
    const secretFile = document.getElementById('secretInput').files[0];
    const password = document.getElementById('password').value;
    const status = document.getElementById('status');

    if (!carrierFile || !secretFile || !password) { 
        alert("Please select both files and enter a password!"); 
        return; 
    }
    
    status.innerHTML = "🔐 <span class='animate-pulse'>Encrypting & Cloaking...</span>";

    try {
        const carrierBuf = await carrierFile.arrayBuffer();
        const secretBuf = await secretFile.arrayBuffer();
        
        // 1. Encrypt the secret file
        const encrypted = await encryptData(new Uint8Array(secretBuf), password);
        
        const markerBytes = new TextEncoder().encode(MARKER);
        const nameBytes = new TextEncoder().encode(secretFile.name); // Stores "secret.pdf"
        
        // 2. Create Header: 1 byte (NameLen) + 4 bytes (DataLen)
        const header = new ArrayBuffer(5);
        const headerView = new DataView(header);
        headerView.setUint8(0, nameBytes.length);
        headerView.setUint32(1, encrypted.length);

        // 3. Construct the "Cloaked" file structure
        // [Carrier] + [MARKER] + [Header] + [Original FileName] + [Encrypted Data]
        const finalBlob = new Blob([
            carrierBuf, 
            markerBytes, 
            header, 
            nameBytes, 
            encrypted
        ], { type: carrierFile.type });

        const link = document.createElement('a');
        link.href = URL.createObjectURL(finalBlob);
        link.download = "cloaked_" + carrierFile.name;
        link.click();
        
        status.innerHTML = "<span class='text-teal-400 font-bold'>✅ Successfully cloaked!</span>";
    } catch (e) { 
        status.innerHTML = "❌ Error: " + e.message; 
    }
}

        async function encryptData(data, password) {
            const salt = crypto.getRandomValues(new Uint8Array(16));
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const keyMaterial = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
            const key = await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:100000,hash:"SHA-256"}, keyMaterial, {name:"AES-GCM",length:256}, false, ["encrypt"]);
            const encrypted = await crypto.subtle.encrypt({name:"AES-GCM",iv}, key, data);
            const res = new Uint8Array(16+12+encrypted.byteLength);
            res.set(salt,0); res.set(iv,16); res.set(new Uint8Array(encrypted),28);
            return res;
        }
    </script>
</body>
</html>
