<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Embed in Audio | SteganoVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-advanced { background: radial-gradient(circle at 10% 20%, rgb(17, 24, 39) 0%, rgb(30, 41, 59) 100%); }
        .btn-back {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    color: #94a3b8;
    font-size: 0.875rem;
    font-weight: 600;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.btn-back:hover {
    background: rgba(59, 130, 246, 0.1);
    border-color: rgba(59, 130, 246, 0.4);
    color: #60a5fa;
    transform: translateX(-4px);
    box-shadow: -10px 0 20px -10px rgba(59, 130, 246, 0.3);
}

.btn-back svg {
    transition: transform 0.3s ease;
}

.btn-back:hover svg {
    transform: translateX(-3px);
}
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="bg-advanced min-h-screen text-white p-6">
    <div class="max-w-6xl mx-auto">
        <button onclick="window.location.href='index.html'" class="btn-back mb-8 group">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
    <span>Back to Workspace</span>
</button>

        <h1 class="text-4xl font-bold text-center mb-8 text-blue-400">Embed Secret in Audio</h1>

        <div class="flex flex-col md:flex-row gap-6 mb-8">
            <div class="flex-1 glass-panel p-6 rounded-3xl flex flex-col border-2 border-dashed border-blue-500/30">
                <h2 class="text-xl font-bold mb-4 text-blue-400">1. Cover Audio</h2>
                <div class="w-full h-64 bg-gray-900/50 rounded-2xl flex flex-col items-center justify-center mb-4 border border-white/5">
                    <audio id="audioPreview" controls class="hidden w-4/5"></audio>
                    <p id="audioPlaceholder" class="text-gray-500 px-4 text-center">Select cover audio (.wav/.mp3)</p>
                </div>
                <input type="file" id="audioInput" accept="audio/*" class="hidden" onchange="previewAudio()">
                <button onclick="document.getElementById('audioInput').click()" class="mt-auto w-full py-3 bg-blue-600/20 border border-blue-500/50 rounded-xl font-bold hover:bg-blue-600 transition">Select Audio</button>
            </div>

            <div class="flex-1 glass-panel p-6 rounded-3xl flex flex-col border-2 border-dashed border-teal-500/30">
                <h2 class="text-xl font-bold mb-4 text-teal-400">2. Secret Data</h2>
                <div class="w-full h-64 bg-gray-900/50 rounded-2xl flex items-center justify-center mb-4 border border-white/5">
                    <p id="filePlaceholder" class="text-gray-500 px-4 text-center">Select any file to hide</p>
                </div>
                <input type="file" id="secretInput" class="hidden" onchange="updateFileInfo()">
                <button onclick="document.getElementById('secretInput').click()" class="mt-auto w-full py-3 bg-teal-600/20 border border-teal-500/50 rounded-xl font-bold hover:bg-teal-700 transition">Select Secret File</button>
            </div>
        </div>

        <div class="max-w-2xl mx-auto glass-panel p-8 rounded-3xl">
            <div class="mb-6">
                <label class="block text-blue-300 text-sm font-bold mb-2">3. Protection Password</label>
                <input type="password" id="passphrase" class="w-full bg-gray-800 border border-white/10 p-4 rounded-xl text-white focus:outline-none focus:border-blue-500 shadow-inner" placeholder="Set password">
            </div>
            
            <button id="embedBtn" onclick="processAudioEmbedding()" class="w-full py-4 bg-gradient-to-r from-blue-600 to-teal-500 rounded-xl font-extrabold text-lg shadow-lg hover:scale-[1.02] active:scale-95 transition-all">
                EMBED & DOWNLOAD .WAV
            </button>
            <p id="status" class="mt-4 text-center text-sm font-medium"></p>
        </div>
    </div>

    <script>
        function previewAudio() {
            const input = document.getElementById('audioInput');
            const preview = document.getElementById('audioPreview');
            const placeholder = document.getElementById('audioPlaceholder');
            if (input.files[0]) {
                preview.src = URL.createObjectURL(input.files[0]);
                preview.classList.remove('hidden');
                placeholder.classList.add('hidden');
            }
        }

        function updateFileInfo() {
            const input = document.getElementById('secretInput');
            const placeholder = document.getElementById('filePlaceholder');
            if (input.files[0]) {
                placeholder.innerHTML = `📄 <span class="text-teal-400 font-bold">${input.files[0].name}</span>`;
            }
        }

        async function encryptData(data, password) {
            const encoder = new TextEncoder();
            const salt = window.crypto.getRandomValues(new Uint8Array(16));
            const iv = window.crypto.getRandomValues(new Uint8Array(12));
            const passwordKey = await window.crypto.subtle.importKey("raw", encoder.encode(password), "PBKDF2", false, ["deriveKey"]);
            const aesKey = await window.crypto.subtle.deriveKey(
                { name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" },
                passwordKey, { name: "AES-GCM", length: 256 }, false, ["encrypt"]
            );
            const encryptedContent = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv }, aesKey, data);
            const combined = new Uint8Array(salt.length + iv.length + encryptedContent.byteLength);
            combined.set(salt, 0); 
            combined.set(iv, 16); 
            combined.set(new Uint8Array(encryptedContent), 28);
            return combined;
        }

        async function processAudioEmbedding() {
    const audioInput = document.getElementById('audioInput');
    const secretInput = document.getElementById('secretInput');
    const password = document.getElementById('passphrase').value;
    const status = document.getElementById('status');

    if (!audioInput.files[0] || !secretInput.files[0] || !password) {
        alert("Please fill all fields!");
        return;
    }

    status.innerHTML = "🎵 <span class='animate-pulse'>Processing Audio & Embedding Metadata...</span>";

    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const arrayBuffer = await audioInput.files[0].arrayBuffer();
        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        
        let pcmData = audioBuffer.getChannelData(0);
        let intData = new Int16Array(pcmData.length);

        // --- BIT-PERFECT PCM CONVERSION ---
        for (let i = 0; i < pcmData.length; i++) {
            let s = Math.max(-1, Math.min(1, pcmData[i]));
            intData[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }

        const secretBuffer = await secretInput.files[0].arrayBuffer();
        const encryptedData = await encryptData(new Uint8Array(secretBuffer), password);
        
        // --- NEW HEADER LOGIC: Store Name + Extension ---
        // Structure: [NameLen (1b)] + [FileName] + [DataLen (4b)] + [EncryptedPayload]
        const fileName = secretInput.files[0].name;
        const fileNameBytes = new TextEncoder().encode(fileName);
        
        let dataToHide = new Uint8Array(1 + fileNameBytes.length + 4 + encryptedData.length);
        let view = new DataView(dataToHide.buffer);

        // 1. Store Filename Length (1 byte)
        view.setUint8(0, fileNameBytes.length);
        // 2. Store Filename
        dataToHide.set(fileNameBytes, 1);
        // 3. Store Encrypted Data Length (4 bytes)
        view.setUint32(1 + fileNameBytes.length, encryptedData.length);
        // 4. Store the Encrypted Payload
        dataToHide.set(encryptedData, 1 + fileNameBytes.length + 4);
        // -------------------------------------------------

        if (dataToHide.length * 8 > intData.length) {
            throw new Error("Audio too short for this file!");
        }

        // LSB Embedding
        let bitIdx = 0;
        const totalBits = dataToHide.length * 8;
        for (let i = 0; i < intData.length && bitIdx < totalBits; i++) {
            const byteIdx = Math.floor(bitIdx / 8);
            const bitValue = (dataToHide[byteIdx] >> (7 - (bitIdx % 8))) & 1;
            intData[i] = (intData[i] & 0xFFFE) | bitValue;
            bitIdx++;
        }

        const wavBlob = createWavBlob(intData, audioBuffer.sampleRate);
        const url = URL.createObjectURL(wavBlob);
        const link = document.createElement('a');
        link.href = url;
        link.download = "stego_audio.wav";
        link.click();

        status.innerHTML = "<span class='text-teal-400 font-bold'>✅ Success! Downloaded stego_audio.wav</span>";
    } catch (err) {
        status.innerText = "❌ Error: " + err.message;
    }
}

        function createWavBlob(samples, sampleRate) {
            const buffer = new ArrayBuffer(44 + samples.length * 2);
            const view = new DataView(buffer);
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };

            writeString(0, 'RIFF');
            view.setUint32(4, 36 + samples.length * 2, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); // PCM
            view.setUint16(22, 1, true); // Mono
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, samples.length * 2, true);

            for (let i = 0; i < samples.length; i++) {
                view.setInt16(44 + i * 2, samples[i], true);
            }
            return new Blob([view], { type: 'audio/wav' });
        }
    </script>
</body>
</html>
