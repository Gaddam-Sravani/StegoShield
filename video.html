<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Embed in Video | StegoShield</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-advanced { background: radial-gradient(circle at 10% 20%, rgb(17, 24, 39) 0%, rgb(30, 41, 59) 100%); }
        .btn-back {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    color: #94a3b8;
    font-size: 0.875rem;
    font-weight: 600;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.btn-back:hover {
    background: rgba(59, 130, 246, 0.1);
    border-color: rgba(59, 130, 246, 0.4);
    color: #60a5fa;
    transform: translateX(-4px);
    box-shadow: -10px 0 20px -10px rgba(59, 130, 246, 0.3);
}

.btn-back svg {
    transition: transform 0.3s ease;
}

.btn-back:hover svg {
    transform: translateX(-3px);
}
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="bg-advanced min-h-screen text-white p-6">
    <div class="max-w-6xl mx-auto">
    	<button onclick="window.location.href='index.html'" class="btn-back mb-8 group">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
    <span>Back to Workspace</span>
</button>
        <h1 class="text-4xl font-bold text-center mb-8 text-blue-400">Embed Secret in Video</h1>

        <div class="flex flex-col md:flex-row gap-6 mb-8">
            <div class="flex-1 glass-panel p-6 rounded-3xl flex flex-col">
                <h2 class="text-xl font-bold mb-4 text-blue-400">1. Cover Video</h2>
                <div class="w-full h-64 bg-gray-900/50 rounded-2xl flex items-center justify-center border-2 border-dashed border-blue-500/30 overflow-hidden mb-4">
                    <video id="coverPreview" class="hidden h-full w-full object-contain" controls></video>
                    <p id="coverPlaceholder" class="text-gray-500 px-4 text-center">Upload the container video (MP4/WebM)</p>
                </div>
                <input type="file" id="coverInput" accept="video/*" class="hidden" onchange="previewFile('cover')">
                <button onclick="document.getElementById('coverInput').click()" class="mt-auto w-full py-3 bg-blue-600/20 border border-blue-500/50 rounded-xl font-bold hover:bg-blue-600 transition">Select Video</button>
            </div>

            <div class="flex-1 glass-panel p-6 rounded-3xl flex flex-col">
                <h2 class="text-xl font-bold mb-4 text-teal-400">2. Secret File</h2>
                <div class="w-full h-64 bg-gray-900/50 rounded-2xl flex items-center justify-center border-2 border-dashed border-teal-500/30 overflow-hidden mb-4 text-center">
                    <div id="secretPlaceholder">
                        <p class="text-gray-500 px-4">Upload any file to hide</p>
                        <p id="secretName" class="text-teal-400 text-sm mt-2 font-mono"></p>
                    </div>
                </div>
                <input type="file" id="secretInput" class="hidden" onchange="previewFile('secret')">
                <button onclick="document.getElementById('secretInput').click()" class="mt-auto w-full py-3 bg-teal-600/20 border border-teal-500/50 rounded-xl font-bold hover:bg-teal-700 transition">Select Secret</button>
            </div>
        </div>

        <div class="max-w-2xl mx-auto glass-panel p-8 rounded-3xl">
            <div class="mb-6">
                <label class="block text-blue-300 text-sm font-bold mb-2">3. Set Security Password</label>
                <input type="password" id="stegoPass" 
                       class="w-full bg-gray-800 border border-white/10 p-4 rounded-xl text-white focus:outline-none focus:border-blue-500 shadow-inner" 
                       placeholder="Enter password to lock data">
            </div>
            <button id="embedBtn" onclick="processEmbedding()" class="w-full py-4 bg-gradient-to-r from-blue-600 to-teal-500 rounded-xl font-extrabold text-lg shadow-lg hover:scale-[1.02] active:scale-95 transition-all">
                PROCEED AND EMBED
            </button>
            <p id="status" class="mt-4 text-center text-sm font-medium"></p>
        </div>
    </div>

    <script>
        const MARKER = new TextEncoder().encode("STEGO_V1"); // Unique marker to find data

        function previewFile(type) {
            const input = document.getElementById(`${type}Input`);
            if (type === 'cover' && input.files[0]) {
                const preview = document.getElementById('coverPreview');
                preview.src = URL.createObjectURL(input.files[0]);
                preview.classList.remove('hidden');
                document.getElementById('coverPlaceholder').classList.add('hidden');
            } else if (input.files[0]) {
                document.getElementById('secretName').innerText = input.files[0].name;
            }
        }

        async function encryptData(rawData, password) {
            const encoder = new TextEncoder();
            const salt = window.crypto.getRandomValues(new Uint8Array(16));
            const iv = window.crypto.getRandomValues(new Uint8Array(12));
            const passwordKey = await window.crypto.subtle.importKey("raw", encoder.encode(password), "PBKDF2", false, ["deriveKey"]);
            const aesKey = await window.crypto.subtle.deriveKey(
                { name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" },
                passwordKey, { name: "AES-GCM", length: 256 }, false, ["encrypt"]
            );
            const encrypted = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv }, aesKey, rawData);
            const combined = new Uint8Array(16 + 12 + encrypted.byteLength);
            combined.set(salt, 0); combined.set(iv, 16); combined.set(new Uint8Array(encrypted), 28);
            return combined;
        }

        async function processEmbedding() {
            const videoFile = document.getElementById('coverInput').files[0];
            const secretFile = document.getElementById('secretInput').files[0];
            const password = document.getElementById('stegoPass').value;
            const status = document.getElementById('status');

            if (!videoFile || !secretFile || !password) return alert("Fill all fields!");

            status.innerHTML = "🔒 <span class='animate-pulse'>Processing Video Steganography...</span>";
            
            try {
                const encryptedData = await encryptData(await secretFile.arrayBuffer(), password);
                const videoBuffer = await videoFile.arrayBuffer();

                // Build Final Blob: [Video Data] + [MARKER] + [Filename Length] + [Filename] + [Encrypted Data]
                const nameBytes = new TextEncoder().encode(secretFile.name);
                const nameLen = new Uint8Array(1); nameLen[0] = nameBytes.length;

                const finalBlob = new Blob([videoBuffer, MARKER, nameLen, nameBytes, encryptedData], { type: videoFile.type });
                
                const link = document.createElement('a');
                link.download = `stego_${videoFile.name}`;
                link.href = URL.createObjectURL(finalBlob);
                link.click();

                status.innerHTML = "<span class='text-teal-400'>✅ Video Ready! Data appended to end of file.</span>";
            } catch (e) {
                status.innerText = "❌ Error: " + e.message;
            }
        }
    </script>
</body>
</html>
