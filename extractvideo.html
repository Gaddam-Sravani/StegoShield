<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Extract from Video | StegoShield</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-advanced { background: radial-gradient(circle at 10% 20%, rgb(17, 24, 39) 0%, rgb(30, 41, 59) 100%); }
        .btn-back {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    color: #94a3b8;
    font-size: 0.875rem;
    font-weight: 600;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.btn-back:hover {
    background: rgba(59, 130, 246, 0.1);
    border-color: rgba(59, 130, 246, 0.4);
    color: #60a5fa;
    transform: translateX(-4px);
    box-shadow: -10px 0 20px -10px rgba(59, 130, 246, 0.3);
}

.btn-back svg {
    transition: transform 0.3s ease;
}

.btn-back:hover svg {
    transform: translateX(-3px);
}
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="bg-advanced min-h-screen text-white p-6">
    <div class="max-w-6xl mx-auto">
    	<button onclick="window.location.href='index.html'" class="btn-back mb-8 group">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
    <span>Back to Workspace</span>
</button>
        <h1 class="text-4xl font-bold text-center mb-8 text-teal-400">Extract from Video</h1>

        <div class="flex flex-col md:flex-row gap-6 mb-8">
            <div class="flex-1 glass-panel p-6 rounded-3xl flex flex-col border-2 border-dashed border-blue-500/30">
                <h2 class="text-xl font-bold mb-4 text-blue-400">1. Upload Stego Video</h2>
                <div class="w-full h-64 bg-gray-900/50 rounded-2xl flex items-center justify-center overflow-hidden mb-4 border border-white/5">
                    <video id="uploadPreview" class="hidden h-full w-full object-contain" controls></video>
                    <p id="uploadPlaceholder" class="text-gray-500 px-4 text-center">Select the video containing the secret</p>
                </div>
                <input type="file" id="stegoInput" accept="video/*" class="hidden" onchange="previewStego()">
                <button onclick="document.getElementById('stegoInput').click()" class="mt-auto w-full py-3 bg-blue-600/20 border border-blue-500/50 rounded-xl font-bold hover:bg-blue-600 transition">Select Video</button>
            </div>

            <div class="flex-1 glass-panel p-6 rounded-3xl flex flex-col border-2 border-dashed border-teal-500/30">
                <h2 class="text-xl font-bold mb-4 text-teal-400">2. Revealed Secret</h2>
                <div class="w-full h-64 bg-gray-900/50 rounded-2xl flex items-center justify-center overflow-hidden mb-4 text-center">
                    <div id="secretPlaceholder">
                        <p id="extractionMsg" class="text-gray-500 px-4">The hidden file will be restored here</p>
                    </div>
                </div>
                <button id="downloadBtn" class="hidden mt-auto w-full py-3 bg-teal-600/20 border border-teal-500/50 rounded-xl font-bold hover:bg-teal-700 transition">Download Extracted File</button>
            </div>
        </div>

        <div class="max-w-2xl mx-auto glass-panel p-8 rounded-3xl">
            <div class="mb-6">
                <label class="block text-teal-300 text-sm font-bold mb-2">3. Enter Security Password</label>
                <input type="password" id="stegoPass" class="w-full bg-gray-800 border border-white/10 p-4 rounded-xl text-white focus:outline-none focus:border-teal-500 shadow-inner" placeholder="Enter the password used during embedding">
            </div>
            <button id="extractBtn" onclick="processExtraction()" class="w-full py-4 bg-gradient-to-r from-teal-600 to-blue-500 rounded-xl font-extrabold text-lg shadow-lg hover:scale-[1.02] active:scale-95 transition-all">
                EXTRACT SECRET FROM VIDEO
            </button>
            <p id="status" class="mt-4 text-center text-sm font-medium"></p>
        </div>
    </div>

    <script>
        const MARKER = "STEGO_V1";

        function previewStego() {
            const input = document.getElementById('stegoInput');
            if (input.files[0]) {
                const preview = document.getElementById('uploadPreview');
                preview.src = URL.createObjectURL(input.files[0]);
                preview.classList.remove('hidden');
                document.getElementById('uploadPlaceholder').classList.add('hidden');
            }
        }

        async function decryptData(combinedData, password) {
            const encoder = new TextEncoder();
            const salt = combinedData.slice(0, 16);
            const iv = combinedData.slice(16, 28);
            const encryptedContent = combinedData.slice(28);
            const passwordKey = await window.crypto.subtle.importKey("raw", encoder.encode(password), "PBKDF2", false, ["deriveKey"]);
            const aesKey = await window.crypto.subtle.deriveKey(
                { name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" },
                passwordKey, { name: "AES-GCM", length: 256 }, false, ["decrypt"]
            );
            return await window.crypto.subtle.decrypt({ name: "AES-GCM", iv }, aesKey, encryptedContent);
        }

        async function processExtraction() {
            const file = document.getElementById('stegoInput').files[0];
            const password = document.getElementById('stegoPass').value;
            const status = document.getElementById('status');
            if (!file || !password) return alert("Please select video and enter password.");

            status.innerHTML = "🔍 <span class='animate-pulse'>Scanning Video Data...</span>";

            try {
                const buffer = new Uint8Array(await file.arrayBuffer());
                const markerBytes = new TextEncoder().encode(MARKER);
                
                // Find marker index
                let index = -1;
                for (let i = buffer.length - markerBytes.length; i >= 0; i--) {
                    if (buffer[i] === markerBytes[0] && buffer.slice(i, i + markerBytes.length).every((v, k) => v === markerBytes[k])) {
                        index = i;
                        break;
                    }
                }

                if (index === -1) throw new Error("No hidden data found in this video.");

                let pos = index + markerBytes.length;
                const nameLen = buffer[pos]; pos++;
                const fileName = new TextDecoder().decode(buffer.slice(pos, pos + nameLen)); pos += nameLen;
                const encryptedData = buffer.slice(pos);

                const decrypted = await decryptData(encryptedData, password);
                const url = URL.createObjectURL(new Blob([decrypted]));

                document.getElementById('extractionMsg').innerHTML = `✅ <b>File Found:</b><br>${fileName}`;
                const btn = document.getElementById('downloadBtn');
                btn.classList.remove('hidden');
                btn.onclick = () => {
                    const a = document.createElement('a');
                    a.href = url; a.download = fileName; a.click();
                };
                status.innerHTML = "<span class='text-teal-400 font-bold'>Extraction Successful!</span>";
            } catch (e) {
                status.innerHTML = `<span class='text-red-400'>Error: ${e.message}</span>`;
            }
        }
    </script>
</body>
</html>
