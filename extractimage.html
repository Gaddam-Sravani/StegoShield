<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Extract from Image | StegoShield</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-advanced { background: radial-gradient(circle at 10% 20%, rgb(17, 24, 39) 0%, rgb(30, 41, 59) 100%); }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-back {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    color: #94a3b8;
    font-size: 0.875rem;
    font-weight: 600;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.btn-back:hover {
    background: rgba(59, 130, 246, 0.1);
    border-color: rgba(59, 130, 246, 0.4);
    color: #60a5fa;
    transform: translateX(-4px);
    box-shadow: -10px 0 20px -10px rgba(59, 130, 246, 0.3);
}

.btn-back svg {
    transition: transform 0.3s ease;
}

.btn-back:hover svg {
    transform: translateX(-3px);
}
    </style>
</head>
<body class="bg-advanced min-h-screen text-white p-6">
    <div class="max-w-6xl mx-auto">
    	<button onclick="window.location.href='index.html'" class="btn-back mb-8 group">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
    <span>Back to Workspace</span>
</button>
        <h1 class="text-4xl font-bold text-center mb-8 text-teal-400">Extract from Image</h1>

        <div class="flex flex-col md:flex-row gap-6 mb-8">
            
            <div class="flex-1 glass-panel p-6 rounded-3xl flex flex-col border-2 border-dashed border-blue-500/30">
                <h2 class="text-xl font-bold mb-4 text-blue-400">1. Upload Stego Image</h2>
                <div class="w-full h-64 bg-gray-900/50 rounded-2xl flex items-center justify-center overflow-hidden mb-4 border border-white/5">
                    <img id="uploadPreview" class="hidden h-full w-full object-contain">
                    <p id="uploadPlaceholder" class="text-gray-500 px-4 text-center">Select the .png file containing the secret</p>
                </div>
                <input type="file" id="stegoInput" accept="image/png" class="hidden" onchange="previewStego()">
                <button onclick="document.getElementById('stegoInput').click()" class="mt-auto w-full py-3 bg-blue-600/20 border border-blue-500/50 rounded-xl font-bold hover:bg-blue-600 transition">Select Image</button>
            </div>

            <div class="flex-1 glass-panel p-6 rounded-3xl flex flex-col border-2 border-dashed border-teal-500/30">
                <h2 class="text-xl font-bold mb-4 text-teal-400">2. Revealed Secret</h2>
                <div class="w-full h-64 bg-gray-900/50 rounded-2xl flex items-center justify-center overflow-hidden mb-4 text-center">
                    <img id="secretPreview" class="hidden h-full w-full object-contain">
                    <div id="secretPlaceholder">
                        <p id="extractionMsg" class="text-gray-500 px-4">Secret file will appear here after extraction</p>
                    </div>
                </div>
                <button id="downloadBtn" class="hidden mt-auto w-full py-3 bg-teal-600/20 border border-teal-500/50 rounded-xl font-bold hover:bg-teal-700 transition">Download Extracted File</button>
            </div>

        </div>

        <div class="max-w-2xl mx-auto glass-panel p-8 rounded-3xl">
            <div class="mb-6">
                <label class="block text-teal-300 text-sm font-bold mb-2">3. Enter Security Password</label>
                <input type="password" id="stegoPass" 
                       class="w-full bg-gray-800 border border-white/10 p-4 rounded-xl text-white focus:outline-none focus:border-teal-500 shadow-inner" 
                       placeholder="Enter the password used during embedding">
            </div>
            
            <button id="extractBtn" onclick="processExtraction()" class="w-full py-4 bg-gradient-to-r from-teal-600 to-blue-500 rounded-xl font-extrabold text-lg shadow-lg hover:scale-[1.02] active:scale-95 transition-all">
                EXTRACT SECRET FILE
            </button>
            <p id="status" class="mt-4 text-center text-sm font-medium"></p>
        </div>
    </div>

    <script>
        function previewStego() {
            const input = document.getElementById('stegoInput');
            const preview = document.getElementById('uploadPreview');
            const placeholder = document.getElementById('uploadPlaceholder');
            if (input.files[0]) {
                preview.src = URL.createObjectURL(input.files[0]);
                preview.classList.remove('hidden');
                placeholder.classList.add('hidden');
            }
        }

        async function decryptData(combinedData, password) {
            const encoder = new TextEncoder();
            const salt = combinedData.slice(0, 16);
            const iv = combinedData.slice(16, 28);
            const encryptedContent = combinedData.slice(28);

            const passwordKey = await window.crypto.subtle.importKey(
                "raw", encoder.encode(password), "PBKDF2", false, ["deriveKey"]
            );

            const aesKey = await window.crypto.subtle.deriveKey(
                { name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" },
                passwordKey,
                { name: "AES-GCM", length: 256 },
                false, ["decrypt"]
            );

            return await window.crypto.subtle.decrypt({ name: "AES-GCM", iv }, aesKey, encryptedContent);
        }

        async function processExtraction() {
    const stegoInput = document.getElementById('stegoInput');
    const password = document.getElementById('stegoPass').value;
    const status = document.getElementById('status');
    const extractBtn = document.getElementById('extractBtn');

    if (!stegoInput.files[0] || !password) {
        alert("Please upload the stego image and enter the password!");
        return;
    }

    status.innerHTML = "🔍 <span class='animate-pulse text-teal-400'>Analyzing bit layers...</span>";
    extractBtn.disabled = true;

    try {
        // 1. Load the stego image into a canvas
        const img = new Image();
        img.src = URL.createObjectURL(stegoInput.files[0]);
        await new Promise(r => img.onload = r);

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);

        const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

        // 2. Extract raw bits from the LSB of RGB channels
        let allBits = [];
        for (let i = 0; i < pixels.length; i++) {
            if ((i + 1) % 4 === 0) continue; // Skip Alpha channel
            allBits.push(pixels[i] & 1);
        }

        // Helper function to convert bits to bytes
        const getBytes = (startBit, byteCount) => {
            let bytes = new Uint8Array(byteCount);
            for (let i = 0; i < byteCount; i++) {
                let byte = 0;
                for (let bit = 0; bit < 8; bit++) {
                    byte |= (allBits[startBit + (i * 8) + bit] << (7 - bit));
                }
                bytes[i] = byte;
            }
            return bytes;
        };

        // 3. Parse the Standardized Header
        // Header: [NameLen (1b)] + [FileName] + [DataLen (4b)] + [EncryptedData]
        
        // Get Filename Length (1 byte = 8 bits)
        const nameLen = getBytes(0, 1)[0];
        let currentBitPos = 8;

        // Get Filename
        const fileNameBytes = getBytes(currentBitPos, nameLen);
        const fileName = new TextDecoder().decode(fileNameBytes);
        currentBitPos += (nameLen * 8);

        // Get Data Length (4 bytes = 32 bits)
        const dataLenBytes = getBytes(currentBitPos, 4);
        const dataLen = new DataView(dataLenBytes.buffer).getUint32(0);
        currentBitPos += 32;

        // Get Encrypted Payload
        const encryptedBytes = getBytes(currentBitPos, dataLen);

        // 4. Decrypt the Payload
        status.innerHTML = "🔓 <span class='animate-pulse text-blue-400'>Decrypting data...</span>";
        const decryptedBuffer = await decryptData(encryptedBytes, password);
        
        const blob = new Blob([decryptedBuffer]);
        const url = URL.createObjectURL(blob);
        
        const secretPreview = document.getElementById('secretPreview');
        const secretPlaceholder = document.getElementById('secretPlaceholder');
        const extractionMsg = document.getElementById('extractionMsg');
        const downloadBtn = document.getElementById('downloadBtn');

        // 5. Update UI with the recovered filename
        extractionMsg.innerHTML = `📄 Found: <span class='text-teal-400 font-bold'>${fileName}</span>`;
        
        // Attempt image preview if it's an image
        const testImg = new Image();
        testImg.onload = () => {
            secretPreview.src = url;
            secretPreview.classList.remove('hidden');
            secretPlaceholder.classList.add('hidden');
        };
        testImg.onerror = () => {
            secretPreview.classList.add('hidden');
            secretPlaceholder.classList.remove('hidden');
        };
        testImg.src = url;

        downloadBtn.classList.remove('hidden');
        downloadBtn.onclick = () => {
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName; // RESTORES ORIGINAL FILENAME AND EXTENSION
            a.click();
        };

        status.innerHTML = "<span class='text-teal-400 font-bold text-lg'>✅ Successfully extracted!</span>";

    } catch (err) {
        console.error(err);
        status.innerHTML = "<span class='text-red-400 font-bold'>❌ Error: Decryption Failed (Check Password)</span>";
    } finally {
        extractBtn.disabled = false;
    }
}
    </script>
</body>
</html>
